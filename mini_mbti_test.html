
<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini MBTI</title>
<style>
body{font-family:Arial;background:#eef8e8;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.card{background:#fff;padding:30px;border-radius:24px;max-width:600px;width:90%;box-shadow:0 8px 20px rgba(0,0,0,.1);text-align:center}
button{margin:10px;padding:14px 30px;border:none;border-radius:999px;background:#a8d98a;font-size:18px;cursor:pointer}
.progress{height:8px;background:#ddd;border-radius:9px;overflow:hidden}.bar{height:100%;background:#8ccf73;width:0}
</style></head><body><div class=card><h2 id=t></h2><div class=progress><div class=bar id=b></div></div><div id=c></div></div>
<script>
const q=[
["사람들과 있으면 에너지가 생긴다?","E"],["혼자만의 시간이 필요하다?","I"],
["사실이 중요하다?","S"],["상상이 중요하다?","N"],
["논리가 우선이다?","T"],["감정이 우선이다?","F"],
["계획을 세우는 편이다?","J"],["즉흥적인 편이다?","P"],
["처음 보는 사람과 쉽게 대화한다?","E"],["세부사항을 잘 기억한다?","S"],["결정을 오래 고민한다?","F"],["마감 직전에 하는 편이다?","P"]];
let i=0,s={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
function show(){if(i>=q.length){let r=(s.E>=s.I?"E":"I")+(s.S>=s.N?"S":"N")+(s.T>=s.F?"T":"F")+(s.J>=s.P?"J":"P");document.getElementById("t").innerText="당신의 MBTI는 "+r;document.getElementById("c").innerHTML="<p>간단한 재미용 테스트 결과입니다.</p><button onclick='location.reload()'>다시하기</button>";return;}
document.getElementById("t").innerText=(i+1)+"/12 "+q[i][0];
document.getElementById("b").style.width=(i/q.length*100)+"%";
document.getElementById("c").innerHTML="<button onclick='ans(1)'>Y</button><button onclick='ans(0)'>N</button>";
}
function ans(y){if(y)s[q[i][1]]++;else{const p={E:"I",I:"E",S:"N",N:"S",T:"F",F:"T",J:"P",P:"J"};s[p[q[i][1]]]++;}i++;show();}
show();
</script></body></html>
